name: Cypress Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Everyday at 8:00 AM | Cron refresh 2025-10-29
    - cron: '0 8 * * *'
  workflow_dispatch:     # Enables manual runs from the GitHub Actions tab

env:
  NODE_VERSION: '24'

jobs:
  staging-tests:
    name: Staging Environment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Staging Tests
        run: npx cypress run --spec "cypress/e2e/staging-smoke-tests.cy.js" --env testEnv=staging --record --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Staging Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-performance-results
          path: cypress/results/performance-staging.json
          if-no-files-found: ignore

      - name: Upload Staging Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  production-tests:
    name: Production Environment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Production Tests
        run: npx cypress run --spec "cypress/e2e/production-smoke-tests.cy.js" --env testEnv=production --record --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Production Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-performance-results
          path: cypress/results/performance-production.json
          if-no-files-found: ignore

      - name: Upload Production Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  performance-comparison:
    name: Performance Comparison
    runs-on: ubuntu-latest
    needs: [staging-tests, production-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Staging Results
        uses: actions/download-artifact@v4
        with:
          name: staging-performance-results
          path: cypress/results

      - name: Download Production Results
        uses: actions/download-artifact@v4
        with:
          name: production-performance-results
          path: cypress/results

      - name: Generate Performance Comparison
        run: npx cypress run --spec "cypress/e2e/performance-comparison.cy.js"

      - name: Upload Performance Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-comparison-report
          path: |
            cypress/results/performance-comparison.json
            cypress/results/PERFORMANCE_REPORT.md
          if-no-files-found: ignore

      - name: Comment PR with Performance Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('cypress/results/PERFORMANCE_REPORT.md', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
              console.log('✅ Performance report posted to PR');
            } catch (error) {
              console.log('⚠️ Could not post comment to PR:', error.message);
              console.log('Performance report is available in artifacts');
            }

      - name: Send Slack Notification
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚀 Performance Comparison Report",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📊 ISTQB Performance Test Results"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📈 *Performance Report Available*\nView detailed comparison in workflow artifacts"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
