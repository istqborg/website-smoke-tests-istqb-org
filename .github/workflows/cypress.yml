name: Cypress Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Every 6 hours at minute 0 (00:00, 06:00, 12:00, 18:00 UTC) | Cron refresh 2025-10-29
    - cron: '0 */6 * * *'
  workflow_dispatch:     # Enables manual runs from the GitHub Actions tab

env:
  NODE_VERSION: '24'

jobs:
  staging-tests:
    name: Staging Environment Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Staging Tests (Run ${{ matrix.run }}/3)
        run: npx cypress run --spec "cypress/e2e/staging-smoke-tests.cy.js" --env testEnv=staging,CI_RUN_ID=${{ github.run_id }}-staging-${{ matrix.run }} --record --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Staging Results
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: staging-performance-results
          path: cypress/results/performance-staging.json
          if-no-files-found: ignore

      - name: Upload Staging Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  production-tests:
    name: Production Environment Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Production Tests (Run ${{ matrix.run }}/3)
        run: npx cypress run --spec "cypress/e2e/production-smoke-tests.cy.js" --env testEnv=production,CI_RUN_ID=${{ github.run_id }}-production-${{ matrix.run }} --record --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Production Results
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: production-performance-results
          path: cypress/results/performance-production.json
          if-no-files-found: ignore

      - name: Upload Production Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  performance-comparison:
    name: Performance Comparison
    runs-on: ubuntu-latest
    needs: [staging-tests, production-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Staging Results
        uses: actions/download-artifact@v4.1.9
        with:
          name: staging-performance-results
          path: cypress/results

      - name: Download Production Results
        uses: actions/download-artifact@v4.1.9
        with:
          name: production-performance-results
          path: cypress/results

      - name: Generate Performance Comparison
        run: npx cypress run --spec "cypress/e2e/performance-comparison.cy.js"

      - name: Upload Performance Report
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: performance-comparison-report
          path: |
            cypress/results/performance-comparison.json
            cypress/results/PERFORMANCE_REPORT.md
            cypress/results/SLACK_BLOCKS.json
          if-no-files-found: ignore

      - name: Comment PR with Performance Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7.0.1
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('cypress/results/PERFORMANCE_REPORT.md', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
              console.log('✅ Performance report posted to PR');
            } catch (error) {
              console.log('⚠️ Could not post comment to PR:', error.message);
              console.log('Performance report is available in artifacts');
            }

      - name: Commit Historical Performance Data
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              const historyDir = '.performance-history';
              if (fs.existsSync(historyDir) && fs.readdirSync(historyDir).length > 0) {
                // Add and commit historical data
                await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
                await exec.exec('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
                await exec.exec('git', ['add', historyDir]);

                try {
                  await exec.exec('git', ['commit', '-m', 'chore: update performance history from workflow run']);
                  // Note: Push skipped - use PAT if needed
                  console.log('✅ Historical data committed');
                } catch {
                  console.log('ℹ️ No changes to commit');
                }
              }
            } catch (error) {
              console.log('⚠️ Could not commit historical data:', error.message);
            }

      - name: Send Slack Notification
        if: always()
        continue-on-error: true
        run: |
          if [ -f "cypress/results/SLACK_BLOCKS.json" ]; then
            WEBHOOK="${{ secrets.SLACK_WEBHOOK_URL }}"

            # Build payload with blocks
            PAYLOAD=$(cat <<'PAYLOAD_EOF'
          {
            "text": "🚀 Performance Comparison Report - ${{ github.repository }}",
            "blocks": $(cat cypress/results/SLACK_BLOCKS.json)
          }
          PAYLOAD_EOF
            )

            curl -X POST -H 'Content-type: application/json' \
              --data "$PAYLOAD" \
              "$WEBHOOK"
            echo "✅ Slack notification sent"
          else
            echo "⚠️ No performance report available for Slack"
          fi
