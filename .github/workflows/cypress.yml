name: Cypress Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Every 6 hours at minute 0 (00:00, 06:00, 12:00, 18:00 UTC) | Cron refresh 2025-10-29
    - cron: '0 */6 * * *'
  workflow_dispatch:     # Enables manual runs from the GitHub Actions tab

env:
  NODE_VERSION: '24'

jobs:
  staging-tests:
    name: Staging Environment Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Staging Tests (Run ${{ matrix.run }}/3)
        run: npx cypress run --spec "cypress/e2e/staging-smoke-tests.cy.js" --env testEnv=staging,CI_RUN_ID=${{ github.run_id }}-staging-${{ matrix.run }} --record --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Staging Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-performance-results-run-${{ matrix.run }}
          path: cypress/results/performance-staging-run*.json
          if-no-files-found: ignore

      - name: Upload Staging Screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: staging-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  production-tests:
    name: Production Environment Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        run: [1, 2, 3]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Production Tests (Run ${{ matrix.run }}/3)
        run: npx cypress run --spec "cypress/e2e/production-smoke-tests.cy.js" --env testEnv=production,CI_RUN_ID=${{ github.run_id }}-production-${{ matrix.run }} --record --key ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload Production Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-performance-results-run-${{ matrix.run }}
          path: cypress/results/performance-production-run*.json
          if-no-files-found: ignore

      - name: Upload Production Screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: production-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

  performance-comparison:
    name: Performance Comparison
    runs-on: ubuntu-latest
    needs: [staging-tests, production-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download All Staging Results
        uses: actions/download-artifact@v8
        with:
          path: cypress/results
          pattern: staging-performance-results-*

      - name: Download All Production Results
        uses: actions/download-artifact@v8
        with:
          path: cypress/results
          pattern: production-performance-results-*

      - name: Consolidate Performance Results
        run: |
          # Consolidate all staging results into single files
          find cypress/results -name "performance-staging-run*.json" -exec cat {} \; | jq -s 'add' > cypress/results/performance-staging-all.json
          find cypress/results -name "performance-production-run*.json" -exec cat {} \; | jq -s 'add' > cypress/results/performance-production-all.json

          # Move consolidated files to expected location
          mv cypress/results/performance-staging-all.json cypress/results/performance-staging.json
          mv cypress/results/performance-production-all.json cypress/results/performance-production.json

          # Clean up run-specific files
          rm -f cypress/results/*/performance-*-run*.json
          echo "✅ Performance results consolidated"

      - name: Generate Performance Comparison
        run: npx cypress run --spec "cypress/e2e/performance-comparison.cy.js"

      - name: Append Current Run to Performance History
        if: always()
        run: |
          mkdir -p .performance-history
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_ID="${{ github.run_id }}"

          for ENV in staging production; do
            CURRENT="cypress/results/performance-${ENV}.json"
            HISTORY=".performance-history/performance-${ENV}.json"

            if [ ! -f "$CURRENT" ]; then
              echo "⏭️  No current results for ${ENV}, skipping"
              continue
            fi

            # Add timestamp and runId to each measurement
            jq --arg ts "$TIMESTAMP" --arg rid "$RUN_ID" \
              'map(. + {timestamp: $ts, runId: $rid})' "$CURRENT" > /tmp/current-enhanced.json

            if [ -f "$HISTORY" ]; then
              jq -s '.[0] + .[1]' "$HISTORY" /tmp/current-enhanced.json > /tmp/history-updated.json
              mv /tmp/history-updated.json "$HISTORY"
            else
              cp /tmp/current-enhanced.json "$HISTORY"
            fi

            echo "✅ Appended $(jq length /tmp/current-enhanced.json) measurements to ${ENV} history"
          done

      - name: Upload Performance Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-comparison-report
          path: |
            cypress/results/performance-comparison.json
            cypress/results/PERFORMANCE_REPORT.md
            cypress/results/SLACK_BLOCKS.json
          if-no-files-found: ignore

      - name: Comment PR with Performance Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('cypress/results/PERFORMANCE_REPORT.md', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
              console.log('✅ Performance report posted to PR');
            } catch (error) {
              console.log('⚠️ Could not post comment to PR:', error.message);
              console.log('Performance report is available in artifacts');
            }

      - name: Cleanup Old Performance History
        if: always()
        continue-on-error: true
        run: node scripts/cleanup-performance-history.js

      - name: Commit Historical Performance Data
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              const historyDir = '.performance-history';
              const archiveDir = '.performance-history-archive';

              // Add both history and archive directories
              await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
              await exec.exec('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);

              if (fs.existsSync(historyDir) && fs.readdirSync(historyDir).length > 0) {
                await exec.exec('git', ['add', historyDir]);
              }

              if (fs.existsSync(archiveDir) && fs.readdirSync(archiveDir).length > 0) {
                await exec.exec('git', ['add', archiveDir]);
              }

              try {
                await exec.exec('git', ['commit', '-m', 'chore: update performance history and archives']);
                await exec.exec('git', ['push']);
                console.log('✅ Performance data committed and pushed');
              } catch {
                console.log('ℹ️ No changes to commit');
              }
            } catch (error) {
              console.log('⚠️ Could not commit performance data:', error.message);
            }

      - name: Send Slack Notification
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v3
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload-file-path: 'cypress/results/SLACK_BLOCKS.json'
